name: Build ZIP (batman-game)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:static
      - uses: actions/upload-artifact@v4
        with:
          name: batman-game
          path: out/
          compression-level: 9
